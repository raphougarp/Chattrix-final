<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Chattrix - Chat</title>
  <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body class="main-body gradient-bg">
  <div class="app-shell">
    <!-- SIDEBAR GAUCHE -->
    <aside class="sidebar">
      <!-- En-tête sidebar -->
      <div class="sidebar-header">
        <div class="sidebar-logo">Chattrix</div>
        <div class="sidebar-header-buttons">
          <button class="icon-btn pink">
            ⚙
          </button>
          <button class="icon-btn">
            ⤴
          </button>
        </div>
      </div>

      <!-- Profil admin -->
      <div class="sidebar-profile">
        <div class="avatar-circle">A</div>
        <div class="profile-texts">
          <div class="profile-name">Administrateur</div>
          <div class="profile-handle">@admin</div>
        </div>
      </div>

      <!-- Barre de recherche -->
      <div class="sidebar-search">
        <input
          type="text"
          placeholder="Rechercher..."
          class="sidebar-search-input"
        />
      </div>

      <!-- Mes groupes -->
      <div class="sidebar-section">
        <div class="sidebar-section-title">
          Mes Groupes
          <button class="icon-btn small green">+</button>
        </div>
      </div>

      <!-- Conversations -->
      <div class="sidebar-section flex-1">
        <div class="sidebar-section-title">
          Conversations
        </div>
        <!-- plus tard : liste des conversations -->
      </div>
    </aside>

    <!-- ZONE PRINCIPALE (WELCOME) -->
    <main class="main-panel">
      <div class="welcome-container">
        <div class="welcome-icon-circle">
          👥
        </div>
        <h1 class="welcome-title">Bienvenue sur Chattrix</h1>
        <p class="welcome-text">
          Sélectionnez une conversation ou créez un groupe pour commencer
        </p>
      </div>
    </main>
  </div>
</body>
</html>
